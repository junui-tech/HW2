<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --positive: #10b981;
            --negative: #ef4444;
            --neutral: #94a3b8;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 40px var(--accent-glow);
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: transform 0.3s ease;
        }
        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 1rem;
            font-size: 1rem;
            color: #f8fafc;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        button {
            margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }
        .results {
            margin-top: 2.5rem;
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            animation: slideUp 0.5s ease forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .metric {
            background: rgba(15, 23, 42, 0.6);
            padding: 1.5rem 1rem;
            border-radius: 16px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .metric-label {
            font-size: 0.85rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .metric-value {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .sentiment-positive { color: var(--positive); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .sentiment-negative { color: var(--negative); text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        .sentiment-neutral { color: var(--neutral); text-shadow: 0 0 10px rgba(148, 163, 184, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sentiment AI</h1>
        <p class="subtitle">Analyze the emotion and subjectivity of your text</p>
        
        <textarea id="textInput" placeholder="I absolutely love the new features! They are incredibly fast, but some UI elements are confusing..."></textarea>
        <button onclick="analyzeText()" id="analyzeBtn">Analyze Text</button>

        <div class="results" id="resultsBlock">
            <div class="metric">
                <span class="metric-label">Sentiment</span>
                <span class="metric-value" id="resSentiment">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Polarity</span>
                <span class="metric-value" style="color: #60a5fa;" id="resPolarity">-</span>
            </div>
            <div class="metric">
                <span class="metric-label">Subjectivity</span>
                <span class="metric-value" style="color: #c084fc;" id="resSubjectivity">-</span>
            </div>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('textInput').value;
            if (!text.trim()) return;
            
            const btn = document.getElementById('analyzeBtn');
            btn.textContent = 'Analyzing...';
            btn.style.opacity = '0.7';

            try {
                // Call our local FastAPI endpoint
                const response = await fetch('/api/v1/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                
                document.getElementById('resultsBlock').style.display = 'grid';
                
                const sentEl = document.getElementById('resSentiment');
                sentEl.textContent = data.sentiment.charAt(0).toUpperCase() + data.sentiment.slice(1);
                sentEl.className = 'metric-value sentiment-' + data.sentiment;
                
                document.getElementById('resPolarity').textContent = `${(data.polarity * 100).toFixed(0)}%`;
                document.getElementById('resSubjectivity').textContent = `${(data.subjectivity * 100).toFixed(0)}%`;
                
            } catch (err) {
                alert('Analysis failed. Please check the server connection.');
            } finally {
                btn.textContent = 'Analyze Text';
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
